name: PR Tests & Dev Deploy

on:
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20.x'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      migrations: ${{ steps.detect.outputs.has_migration_changes }}
      markdown_only: ${{ steps.markdown_only.outputs.markdown_only }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect migration file changes
        id: detect
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/ci/has-migration-changes.mjs

      - name: Detect markdown-only changes
        id: markdown_only
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/ci/is-markdown-only-changes.mjs

  docs-only:
    needs: detect-changes
    if: needs.detect-changes.outputs.markdown_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip tests and dev deploy for documentation-only PRs
        run: echo "Markdown-only PR — skipping unit tests and dev deployment."

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.markdown_only != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: npm test -- --ci

  migrate-check:
    needs: detect-changes
    if: needs.detect-changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: aipilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d aipilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate migration sequence
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/aipilot
        run: node scripts/ci/validate-migrations.mjs

  deploy-dev:
    needs: [test, detect-changes, migrate-check]
    # always() is required: when the PR has no migration file changes, migrate-check
    # is skipped and GitHub would otherwise skip deploy-dev too — even though app-only
    # PRs should still deploy to dev.
    if: ${{ always() && !cancelled() && needs.detect-changes.outputs.markdown_only != 'true' && needs.test.result == 'success' && (needs.detect-changes.outputs.migrations != 'true' || needs.migrate-check.result == 'success') }}
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: pr-dev-${{ github.head_ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          VITE_TEAMS: ${{ vars.VITE_TEAMS }}
        run: npm run build

      - name: Detect migration changes
        id: migration_changes
        env:
          MIGRATION_DETECT_STRATEGY: db
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/ci/has-migration-changes.mjs

      - name: Run database migrations
        if: steps.migration_changes.outputs.has_migration_changes == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run migrate:up

      - name: Create deployment package
        run: |
          mkdir -p deploy/dist
          cp -r dist/* deploy/dist/
          cp package*.json deploy/
          cp server.js deploy/ 2>/dev/null || true
          cp -r scripts deploy/
          cd deploy
          npm ci --omit=dev
          cd ..
          (cd deploy && zip -r ../deploy.zip .)

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Extract Azure credentials
        run: |
          echo "AZURE_TENANT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.tenantId')" >> $GITHUB_ENV
          echo "AZURE_CLIENT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.clientId')" >> $GITHUB_ENV
          echo "AZURE_CLIENT_SECRET=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.clientSecret')" >> $GITHUB_ENV

      - name: Set App Service Configuration
        env:
          APP_NAME: app-scrum-dev
          RG_NAME: rg-scrum-dev
        run: |
          az webapp config appsettings set \
            --name $APP_NAME \
            --resource-group $RG_NAME \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ENABLE_ORYX_BUILD=false \
              WEBSITE_RUN_FROM_PACKAGE=1 \
              NODE_ENV=production \
              ADO_ORG="${{ secrets.ADO_ORG }}" \
              ADO_PAT="${{ secrets.ADO_PAT }}" \
              ADO_PROJECT="${{ secrets.ADO_PROJECT }}" \
              ADO_AREA_PATH="${{ secrets.ADO_PROJECT }}" \
              ADO_ALLOWED_PROJECTS="${{ vars.ADO_ALLOWED_PROJECTS }}" \
              VITE_ADO_ORG="amergis" \
              VITE_ADO_PROJECT="${{ secrets.ADO_PROJECT }}" \
              VITE_TEAMS="${{ vars.VITE_TEAMS }}" \
              AZURE_TENANT_ID="${{ env.AZURE_TENANT_ID }}" \
              AZURE_CLIENT_ID="${{ env.AZURE_CLIENT_ID }}" \
              AZURE_CLIENT_SECRET="${{ env.AZURE_CLIENT_SECRET }}" \
              AZURE_REDIRECT_URL="${{ secrets.AZURE_REDIRECT_URL }}" \
              AZURE_COST_TENANT_ID="${{ secrets.AZURE_COST_TENANT_ID }}" \
              AZURE_COST_CLIENT_ID="${{ secrets.AZURE_COST_CLIENT_ID }}" \
              AZURE_COST_CLIENT_SECRET="${{ secrets.AZURE_COST_CLIENT_SECRET }}" \
              SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
              CURSOR_API_KEY="${{ secrets.CURSOR_API_KEY }}" \
              CURSOR_TEAM_API_KEY="${{ secrets.CURSOR_TEAM_API_KEY }}" \
              PORT=8080 \
              POLL_INTERVAL=30 \
              WEBSITES_ENABLE_APP_SERVICE_STORAGE=true \
              AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              AWS_REGION="${{ secrets.AWS_REGION }}" \
              BEDROCK_MODEL_ID="${{ secrets.BEDROCK_MODEL_ID }}" \
              BEDROCK_UI_MOCK_MODEL_ID="${{ secrets.BEDROCK_UI_MOCK_MODEL_ID }}" \
              BEDROCK_UI_MOCK_MAX_TOKENS="32000" \
              MAXVIEW_DS_PROJECT="MaxView" \
              MAXVIEW_DS_REPO="MaxView" \
              MAXVIEW_CLIENTAPP_ROOT="/src/Maxim.TimeClock.Web/ClientApp/js" \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              APPLICATIONINSIGHTS_CONNECTION_STRING="${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}" \
              SENDGRID_API_KEY="${{ secrets.SENDGRID_API_KEY }}"

          # The Azure Node/Linux image ships without git, and the Dev Workbench
          # feature shells out to git at runtime. Install it on boot before
          # starting the app. safe.directory is handled in application code
          # (repoCheckoutService.ts), so it is intentionally not set here.
          az webapp config set \
            --name $APP_NAME \
            --resource-group $RG_NAME \
            --startup-file 'bash -c "apt-get update && apt-get install -y git && node /home/site/wwwroot/dist/server/index.js"'

          az webapp update \
            --name $APP_NAME \
            --resource-group $RG_NAME \
            --set clientAffinityEnabled=true

      - name: Deploy to Dev App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-scrum-dev
          package: ./deploy.zip

      - name: Azure logout
        run: az logout
        if: always()
