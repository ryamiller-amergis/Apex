name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: prod-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '24.x'
  APP_SERVICE_NAME: 'app-apex-prd'
  RESOURCE_GROUP_NAME: 'rg-apex-prd-app'
  SLOT_NAME: 'staging'

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: prd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build application
        env:
          VITE_TEAMS: ${{ vars.VITE_TEAMS }}
        run: npm run build

      - name: Detect migration changes
        id: migration_changes
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/ci/has-migration-changes.mjs

      - name: Run database migrations
        if: steps.migration_changes.outputs.has_migration_changes == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run migrate:up

      - name: Verify no pending migrations remain
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          node -e "
          import('pg').then(async ({ default: pg }) => {
            const { readdirSync } = await import('node:fs');
            const { join } = await import('node:path');
            const client = new pg.Client({ connectionString: process.env.DATABASE_URL });
            await client.connect();
            try {
              const files = readdirSync(join(process.cwd(), 'migrations')).filter(f => f.endsWith('.sql'));
              const { rows } = await client.query('SELECT name FROM pgmigrations');
              const applied = new Set(rows.map(r => r.name));
              const pending = files.filter(f => !applied.has(f.replace(/\\.sql\$/, '')));
              if (pending.length > 0) {
                console.error('FAIL: pending migrations after apply: ' + pending.join(', '));
                process.exit(1);
              }
              console.log('OK: no pending migrations.');
            } finally {
              await client.end();
            }
          });
          "

      - name: Create deployment package
        run: |
          mkdir -p deploy/dist
          cp -r dist/* deploy/dist/
          cp package*.json deploy/
          cp server.js deploy/ 2>/dev/null || true
          cp -r scripts deploy/
          cd deploy
          npm ci --omit=dev
          cd ..
          (cd deploy && zip -r ../deploy.zip .)

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Extract Azure credentials
        run: |
          echo "AZURE_TENANT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.tenantId')" >> $GITHUB_ENV
          echo "AZURE_CLIENT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.clientId')" >> $GITHUB_ENV
          echo "AZURE_CLIENT_SECRET=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.clientSecret')" >> $GITHUB_ENV

      - name: Configure staging slot settings
        env:
          STAGING_REDIRECT_URL: https://${{ env.APP_SERVICE_NAME }}-${{ env.SLOT_NAME }}.azurewebsites.net/auth/callback
        run: |
          az webapp config appsettings set \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ENABLE_ORYX_BUILD=false \
              WEBSITE_RUN_FROM_PACKAGE=1 \
              NODE_ENV=production \
              ADO_ORG="${{ secrets.ADO_ORG }}" \
              ADO_PAT="${{ secrets.ADO_PAT }}" \
              ADO_PROJECT="${{ secrets.ADO_PROJECT }}" \
              ADO_AREA_PATH="${{ secrets.ADO_PROJECT }}" \
              ADO_ALLOWED_PROJECTS="${{ vars.ADO_ALLOWED_PROJECTS }}" \
              VITE_ADO_ORG="amergis" \
              VITE_ADO_PROJECT="${{ secrets.ADO_PROJECT }}" \
              VITE_TEAMS="${{ vars.VITE_TEAMS }}" \
              AZURE_TENANT_ID="${{ env.AZURE_TENANT_ID }}" \
              AZURE_CLIENT_ID="${{ env.AZURE_CLIENT_ID }}" \
              AZURE_CLIENT_SECRET="${{ env.AZURE_CLIENT_SECRET }}" \
              AZURE_REDIRECT_URL="${STAGING_REDIRECT_URL}" \
              AZURE_COST_TENANT_ID="${{ secrets.AZURE_COST_TENANT_ID }}" \
              AZURE_COST_CLIENT_ID="${{ secrets.AZURE_COST_CLIENT_ID }}" \
              AZURE_COST_CLIENT_SECRET="${{ secrets.AZURE_COST_CLIENT_SECRET }}" \
              SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
              CURSOR_API_KEY="${{ secrets.CURSOR_API_KEY }}" \
              CURSOR_TEAM_API_KEY="${{ secrets.CURSOR_TEAM_API_KEY }}" \
              PORT=8080 \
              POLL_INTERVAL=30 \
              WEBSITES_ENABLE_APP_SERVICE_STORAGE=true \
              AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              AWS_REGION="${{ secrets.AWS_REGION }}" \
              BEDROCK_MODEL_ID="${{ secrets.BEDROCK_MODEL_ID }}" \
              BEDROCK_UI_MOCK_MODEL_ID="${{ secrets.BEDROCK_UI_MOCK_MODEL_ID }}" \
              BEDROCK_UI_MOCK_MAX_TOKENS="32000" \
              MAXVIEW_DS_PROJECT="MaxView" \
              MAXVIEW_DS_REPO="MaxView" \
              MAXVIEW_CLIENTAPP_ROOT="/src/Maxim.TimeClock.Web/ClientApp/js" \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              APPLICATIONINSIGHTS_CONNECTION_STRING="${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}" \
              PDF_BLOB_ACCOUNT_NAME="${{ vars.PDF_BLOB_ACCOUNT_NAME }}" \
              PDF_BLOB_CONTAINER_NAME="${{ vars.PDF_BLOB_CONTAINER_NAME }}" \
              SENDGRID_API_KEY="${{ secrets.SENDGRID_API_KEY }}" \
              GITHUB_TOKEN="${{ secrets.GH_SKILL_TOKEN }}" \
              GITHUB_ORG="${{ secrets.GH_SKILL_ORG }}" \
              WEBSITE_SWAP_WARMUP_PING_PATH="/api/health/db" \
              WEBSITE_SWAP_WARMUP_PING_STATUSES="200"

          # Mark sticky slot settings (these stay with their slot during swap)
          az webapp config appsettings set \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --slot-settings \
              AZURE_REDIRECT_URL="${STAGING_REDIRECT_URL}" \
              APPLICATIONINSIGHTS_CONNECTION_STRING="${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}"

          # The Azure Node/Linux image ships without git, and the Dev Workbench
          # feature shells out to git at runtime. Install it on boot before
          # starting the app. safe.directory is handled in application code
          # (repoCheckoutService.ts), so it is intentionally not set here.
          az webapp config set \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --linux-fx-version "NODE|24-lts" \
            --startup-file 'bash -c "(apt-get update && apt-get install -y git || true) && node /home/site/wwwroot/dist/server/index.js"'

          az webapp update \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --set clientAffinityEnabled=true

      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_SERVICE_NAME }}
          slot-name: ${{ env.SLOT_NAME }}
          package: ./deploy.zip

      - name: Health check staging slot
        run: |
          echo "Waiting for staging slot to warm up..."
          sleep 30
          SLOT_URL="https://${{ env.APP_SERVICE_NAME }}-${{ env.SLOT_NAME }}.azurewebsites.net/api/health/db"
          MAX_ATTEMPTS=10
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Health check attempt $ATTEMPT/$MAX_ATTEMPTS: $SLOT_URL"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SLOT_URL" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Staging slot is healthy (HTTP 200)"
              exit 0
            fi
            echo "Got HTTP $HTTP_CODE, waiting 15s..."
            sleep 15
          done
          echo "FAIL: Staging slot did not become healthy after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Azure logout
        run: az logout || true
        if: always()

  swap:
    needs: [deploy-staging, deployed-smoke-staging]
    runs-on: ubuntu-latest
    environment: prd-production

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap staging to production
        run: |
          echo "Swapping ${{ env.SLOT_NAME }} -> production..."
          az webapp deployment slot swap \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --target-slot production

      - name: Smoke test production
        id: smoke
        run: |
          echo "Waiting for production to stabilize..."
          sleep 20
          PROD_URL="https://${{ env.APP_SERVICE_NAME }}.azurewebsites.net/api/health/db"
          MAX_ATTEMPTS=5
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Smoke test attempt $ATTEMPT/$MAX_ATTEMPTS: $PROD_URL"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Production is healthy (HTTP 200)"
              exit 0
            fi
            echo "Got HTTP $HTTP_CODE, waiting 10s..."
            sleep 10
          done
          echo "FAIL: Production not healthy after swap"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.smoke.outcome == 'failure'
        run: |
          echo "Rolling back: swapping production -> ${{ env.SLOT_NAME }}..."
          az webapp deployment slot swap \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --slot production \
            --target-slot ${{ env.SLOT_NAME }}
          echo "Rollback complete."

      - name: Azure logout
        run: az logout || true
        if: always()

  # ── Post-deploy read-only smoke ─────────────────────────────────────────────
  # Run the `deployed-smoke` Playwright project (no local server, no seeding, no
  # /e2e/* writes) against the deployed staging slot and, after swap, production.
  # The STAGING smoke is blocking and gates the swap: it runs to completion while
  # the staging slot is still stable, so the swap cannot restart the slot out from
  # under the authenticated session mid-run. The PROD smoke runs AFTER the swap and
  # stays non-blocking (continue-on-error) — it surfaces regressions as visible
  # signal without failing a promotion that has already completed.
  #
  # Auth model:
  #   • STAGING → FULLY-AUTOMATED programmatic Azure AD SSO login. The `setup`
  #     Playwright project drives the real Entra login form with the dedicated
  #     test-account credentials and produces a fresh, ephemeral storageState each
  #     run (no stored/manually-captured session blob).
  #   • PROD → stays UNAUTHENTICATED: only the read-only @prod-safe boundary runs,
  #     with NO credentials and NO setup project. Authenticated coverage lives on
  #     dev + staging.
  #
  # The E2E test account MUST be exempt from MFA / conditional access for staging —
  # programmatic login cannot clear an interactive MFA challenge.
  #
  # Required repo config:
  #   vars.E2E_STAGING_BASE_URL  (optional) staging URL; defaults to the staging slot.
  #   vars.E2E_PROD_BASE_URL     (optional) prod URL; defaults to app-apex-prd.
  #   secrets.E2E_TEST_USER      dedicated Azure AD E2E test account UPN/email (staging).
  #   secrets.E2E_TEST_PASSWORD  password for that account (staging).
  deployed-smoke-staging:
    needs: [deploy-staging]
    if: always() && !cancelled() && needs.deploy-staging.result == 'success'
    runs-on: ubuntu-latest
    # No `environment:` — reads repo-level vars/secrets and stays ungated so a
    # read-only smoke never adds an approval prompt to the prod deploy.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run setup + deployed-smoke against staging slot
        env:
          CI: true
          E2E_BASE_URL: ${{ vars.E2E_STAGING_BASE_URL || format('https://{0}-{1}.azurewebsites.net', env.APP_SERVICE_NAME, env.SLOT_NAME) }}
          E2E_TEST_USER: ${{ secrets.E2E_TEST_USER }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: npx playwright test --project=deployed-smoke

      - name: Upload deployed-smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployed-smoke-staging-results-${{ github.run_id }}
          path: playwright-results/
          retention-days: 7

  deployed-smoke-prod:
    needs: [swap]
    if: always() && !cancelled() && needs.swap.result == 'success'
    runs-on: ubuntu-latest
    # No `environment:` — must stay ungated so it does not re-trigger the
    # prd-production manual-approval gate after the swap already completed.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Production stays UNAUTHENTICATED by design: no SSO credentials, no `setup`
      # project, no storageState. The @prod-safe subset is the strictly read-only
      # boundary — never seeds, never mutates, never calls /e2e/*, and never logs
      # in against production. Authenticated coverage runs on dev + staging.
      - name: Run prod-safe smoke against production (unauthenticated)
        continue-on-error: true
        env:
          CI: true
          E2E_BASE_URL: ${{ vars.E2E_PROD_BASE_URL || format('https://{0}.azurewebsites.net', env.APP_SERVICE_NAME) }}
        run: npx playwright test --project=deployed-smoke --grep "@prod-safe"

      - name: Upload prod-safe smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployed-smoke-prod-results-${{ github.run_id }}
          path: playwright-results/
          retention-days: 7
